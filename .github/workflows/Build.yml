name: Build

on:
  push:
    branches:
      - main
    tags:
      - "v*"
  pull_request:
  workflow_dispatch:
    inputs:
      build_type:
        type: choice
        description: Select build variant
        required: true
        default: both
        options:
          - debug
          - release
          - both

permissions:
  contents: write
  actions: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Resolve Build Type
        id: build_type
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            BUILD_TYPE="${{ github.event.inputs.build_type }}"
          elif [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
            BUILD_TYPE="release"
          else
            BUILD_TYPE="both"
          fi
          echo "value=${BUILD_TYPE}" >> "$GITHUB_OUTPUT"
          echo "Resolved build type: ${BUILD_TYPE}"

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: gradle

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Grant execute permission to gradlew
        run: chmod +x gradlew

      - name: Restore optional Firebase config
        shell: bash
        run: |
          if [ -n "${{ secrets.FCM }}" ]; then
            echo "${{ secrets.FCM }}" | base64 -d > app/google-services.json
            echo "google-services.json restored from secret"
          else
            echo "FCM secret not configured, continuing without google-services.json"
          fi

      - name: Run Tests and Build
        shell: bash
        env:
          BILI_BUILD_COMMIT_SHA: ${{ github.sha }}
          BILI_BUILD_GIT_REF: ${{ github.ref }}
          BILI_BUILD_WORKFLOW_RUN_ID: ${{ github.run_id }}
          BILI_BUILD_WORKFLOW_RUN_URL: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}
          BILI_BUILD_RELEASE_TAG: ${{ startsWith(github.ref, 'refs/tags/') && github.ref_name || '' }}
        run: |
          COMMON_ARGS=(
            "-Pbili.build.commitSha=${BILI_BUILD_COMMIT_SHA}"
            "-Pbili.build.gitRef=${BILI_BUILD_GIT_REF}"
            "-Pbili.build.workflowRunId=${BILI_BUILD_WORKFLOW_RUN_ID}"
            "-Pbili.build.workflowRunUrl=${BILI_BUILD_WORKFLOW_RUN_URL}"
            "-Pbili.build.releaseTag=${BILI_BUILD_RELEASE_TAG}"
          )

          ./gradlew --no-parallel --max-workers=2 "${COMMON_ARGS[@]}" :app:testDebugUnitTest

          if [ "${{ steps.build_type.outputs.value }}" != "release" ]; then
            ./gradlew --no-parallel --max-workers=2 "${COMMON_ARGS[@]}" :app:assembleDebug
          fi

          if [ "${{ steps.build_type.outputs.value }}" != "debug" ]; then
            ./gradlew --no-parallel --max-workers=2 "${COMMON_ARGS[@]}" :app:assembleRelease
          fi

      - name: Collect APK Artifacts
        id: apks
        shell: bash
        run: |
          APK_FILES=$(find "${{ github.workspace }}/app/build/outputs/apk" -name "*.apk" -type f | sort)
          if [ -z "${APK_FILES}" ]; then
            echo "No APK files found"
            exit 1
          fi
          {
            echo "files<<EOF"
            echo "${APK_FILES}"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"
          echo "${APK_FILES}"

      - name: Upload APK Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: BiliPai-Focus-${{ steps.build_type.outputs.value }}
          path: ${{ steps.apks.outputs.files }}
          retention-days: 7
          if-no-files-found: error

      - name: Publish GitHub Release APK
        if: startsWith(github.ref, 'refs/tags/v')
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ github.ref_name }}
        shell: bash
        run: |
          RELEASE_APK=$(find "${{ github.workspace }}/app/build/outputs/apk/release" -name "*.apk" -type f | sort | head -n 1)
          if [ -z "${RELEASE_APK}" ]; then
            echo "Release APK not found"
            exit 1
          fi

          gh release view "${RELEASE_TAG}" --json isDraft >/dev/null 2>&1 || \
            gh release create "${RELEASE_TAG}" \
              --draft \
              --title "${RELEASE_TAG}" \
              --generate-notes

          gh release upload "${RELEASE_TAG}" "${RELEASE_APK}" --clobber
          gh release edit "${RELEASE_TAG}" --draft=false
