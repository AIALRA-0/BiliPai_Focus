name: Build

on:
  push:
  workflow_dispatch:
    inputs:
      build_type:
        type: choice
        description: Select build variant
        required: true
        default: both
        options:
          - debug
          - release
          - both

permissions:
  contents: read
  actions: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Resolve Build Type
        id: build_type
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            BUILD_TYPE="${{ github.event.inputs.build_type }}"
          else
            BUILD_TYPE="both"
          fi
          echo "value=${BUILD_TYPE}" >> "$GITHUB_OUTPUT"
          echo "Resolved build type: ${BUILD_TYPE}"

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: gradle

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Grant execute permission to gradlew
        run: chmod +x gradlew

      - name: Restore optional Firebase config
        shell: bash
        run: |
          if [ -n "${{ secrets.FCM }}" ]; then
            echo "${{ secrets.FCM }}" | base64 -d > app/google-services.json
            echo "google-services.json restored from secret"
          else
            echo "FCM secret not configured, continuing without google-services.json"
          fi

      - name: Run unit tests
        run: ./gradlew --no-parallel --max-workers=2 :app:testDebugUnitTest

      - name: Run lint
        run: ./gradlew --no-parallel --max-workers=2 :app:lintDebug

      - name: Assemble Debug APK
        if: steps.build_type.outputs.value != 'release'
        run: ./gradlew --no-parallel --max-workers=2 :app:assembleDebug

      - name: Assemble Release APK
        if: steps.build_type.outputs.value != 'debug'
        run: ./gradlew --no-parallel --max-workers=2 :app:assembleRelease

      - name: Summarize assembled variants
        shell: bash
        run: |
          case "${{ steps.build_type.outputs.value }}" in
            debug)
              echo "Assembled debug APK only"
              ;;
            release)
              echo "Assembled release APK only"
              ;;
            both)
              echo "Assembled debug and release APKs"
              ;;
            *)
              echo "Unknown build type: ${{ steps.build_type.outputs.value }}"
              exit 1
              ;;
          esac

      - name: Collect APK artifacts
        id: apks
        shell: bash
        run: |
          APK_FILES=$(find "${{ github.workspace }}/app/build/outputs/apk" -name "*.apk" -type f | sort)
          if [ -z "${APK_FILES}" ]; then
            echo "No APK files found"
            exit 1
          fi
          {
            echo "files<<EOF"
            echo "${APK_FILES}"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"
          echo "${APK_FILES}"

      - name: Upload APK Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: BiliPai-${{ steps.build_type.outputs.value }}
          path: ${{ steps.apks.outputs.files }}
          retention-days: 7
          if-no-files-found: error
